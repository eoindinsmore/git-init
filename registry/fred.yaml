# FRED series declarations.
# series_id is our canonical id; source_code is FRED's series id.
# Add a series here BEFORE pulling it for the first time.

- series_id: us_industrial_production
  source: fred
  source_code: INDPRO
  name: "US Industrial Production: Total Index"
  unit: "Index 2017=100"
  frequency: M
  sa_status: SA
  transformations: [yoy]
  publication_lag_days: 16
  release_schedule: "monthly, ~mid-month for the prior month (Federal Reserve G.17)"
  tags:
    metal:
    country: US
    category: activity
    macro_theme: activity

# Price proxy: IMF global copper price via FRED (free). Not an exchange price —
# carries caveats per the charter (auto-rendered on charts/PDFs).
- series_id: copper_price_global
  source: fred
  source_code: PCOPPUSDM
  name: "Global Price of Copper (IMF, via FRED)"
  unit: "USD per metric ton"
  frequency: M
  sa_status: NSA
  transformations: []
  publication_lag_days: 14
  release_schedule: "monthly, early in the month for the prior month (IMF PCPS)"
  tags:
    metal: copper
    country:
    category: price_proxy
    macro_theme: commodities
  caveats: >-
    IMF Primary Commodity Prices — a monthly reference average, NOT an LME/COMEX
    settlement. No intramonth granularity; may lag exchange moves. Use as a
    long-history proxy only, not for execution or premium analysis.
