# CFTC Commitments of Traders (disaggregated futures-only), COMEX copper.
# One series per position field; source_code = CFTC column, source_params.market
# filters the dataset. category: positioning.
#
# publication_lag_days: 3 — Tuesday position date, released the following Friday.
# The adapter already stamps as_of = report_date + 3d; this metadata documents the
# same lag so downstream lead-lag/nowcast code reads it without adapter internals.

- series_id: copper_cot_open_interest
  source: cftc
  source_code: open_interest_all
  name: "COMEX Copper COT — open interest (all)"
  unit: "contracts"
  frequency: W
  sa_status: NSA
  transformations: []
  publication_lag_days: 3
  release_schedule: "weekly, Friday 15:30 ET for Tuesday positions"
  tags: {metal: copper, country: US, category: positioning, macro_theme: positioning}
  source_params: {market: "COPPER%"}

