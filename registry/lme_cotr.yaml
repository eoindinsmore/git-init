# LME Commitments of Traders (MiFID II), free weekly XLSX per metal.
# One series per (category, side); source_params carries the CDN folder/key and
# the cell selector. category: positioning. Adds an LME-side view to complement
# the CFTC COMEX COT (different exchange, MiFID II classifications).
#
# publication_lag_days: 4 — Friday position date, published the following Tuesday.

- series_id: copper_lme_inv_funds_long
  source: lme_cotr
  source_code: ca
  name: "LME Copper COTR — Investment Funds long (total)"
  unit: "lots"
  frequency: W
  sa_status: NSA
  transformations: []
  publication_lag_days: 4
  release_schedule: "weekly, Tuesday for the prior Friday positions"
  tags: {metal: copper, country: GB, category: positioning, macro_theme: positioning}
  source_params: {folder: "ca-copper", key: "ca", category: "Investment Funds", side: "Long", basis: "Total"}

