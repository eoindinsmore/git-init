# Aluminium physical-premium proxies, captured daily by adapters/premium.py.
# source: premium (yfinance front-month continuous). All price_proxy -> caveats required.

- series_id: aluminium_premium_mw_us
  source: premium
  source_code: "AUP=F"
  name: "Aluminium US Midwest Transaction Premium (CME AUP, front-month)"
  unit: "USD per pound"
  frequency: D
  sa_status: NSA
  transformations: []
  publication_lag_days: 0
  release_schedule: "daily settlement, same-day capture"
  tags:
    metal: aluminium
    country: US
    category: price_proxy
    macro_theme: commodities
  caveats: >-
    yfinance front-month continuous for CME AUP=F, NOT the full forward curve and
    NOT the CME published settlement across all listed months (that source is
    bot-blocked). Thin/illiquid contract — expect gaps and stale quotes. Front
    contract only; premium term structure is not captured here. Reference proxy,
    not for execution.

